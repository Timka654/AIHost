version: '3.8'

services:
  aihost:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aihost
    ports:
      - "11434:11434"
    volumes:
      # Mount data directory for persistence
      - ./data:/app/data
      # Optional: Mount models directory if models are stored elsewhere
      # - /path/to/models:/app/data/models
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DOTNET_RUNNING_IN_CONTAINER=true
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Uncomment for AMD GPU support (ROCm)
    # devices:
    #   - /dev/kfd:/dev/kfd
    #   - /dev/dri:/dev/dri
    networks:
      - aihost-network

networks:
  aihost-network:
    driver: bridge
